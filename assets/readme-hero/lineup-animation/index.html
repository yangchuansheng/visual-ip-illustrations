<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #ffffff;
      }
      body {
        font-family: "Inter", sans-serif;
      }
      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #ffffff;
      }
      .lineup {
        position: absolute;
        left: 0;
        top: 0;
        width: 1920px;
        height: 1080px;
        transform-origin: center center;
      }
      .ground {
        position: absolute;
        left: 30px;
        top: 742px;
        width: 1860px;
        height: 2px;
        background: rgba(17, 17, 17, 0.2);
        transform: rotate(-0.05deg);
      }
      .character {
        position: absolute;
        display: block;
        object-fit: contain;
        transform-origin: 50% 92%;
        will-change: transform;
      }
      #xiaohei {
        left: 45px;
        top: 480px;
        width: 190px;
        height: 292px;
        transform-origin: 38% 92%;
      }
      #littlebox {
        left: 244px;
        top: 506px;
        width: 280px;
        height: 242px;
      }
      #tom {
        left: 493px;
        top: 244px;
        width: 360px;
        height: 520px;
        transform-origin: 52% 86%;
      }
      #ferris {
        left: 793px;
        top: 542px;
        width: 266px;
        height: 210px;
        transform-origin: 50% 82%;
      }
      #seal {
        left: 1024px;
        top: 350px;
        width: 344px;
        height: 408px;
        transform-origin: 52% 92%;
      }
      #openclaw {
        left: 1354px;
        top: 421px;
        width: 252px;
        height: 320px;
        transform-origin: 48% 92%;
      }
      #gopher {
        left: 1586px;
        top: 392px;
        width: 290px;
        height: 360px;
        transform-origin: 50% 92%;
      }
      .spark {
        position: absolute;
        border: 2px solid rgba(17, 17, 17, 0.35);
        border-radius: 50%;
        opacity: 0;
        will-change: transform, opacity;
      }
      #spark-left {
        left: 205px;
        top: 492px;
        width: 16px;
        height: 16px;
      }
      #spark-right {
        left: 1655px;
        top: 475px;
        width: 18px;
        height: 18px;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="10"
      data-width="1920"
      data-height="1080"
    >
      <div class="lineup">
        <div class="ground"></div>
        <img id="xiaohei" class="character" src="assets/characters/xiaohei.png" alt="" />
        <img id="littlebox" class="character" src="assets/characters/littlebox.png" alt="" />
        <img id="tom" class="character" src="assets/characters/tom.png" alt="" />
        <img id="ferris" class="character" src="assets/characters/ferris.png" alt="" />
        <img id="seal" class="character" src="assets/characters/seal.png" alt="" />
        <img id="openclaw" class="character" src="assets/characters/openclaw.png" alt="" />
        <img id="gopher" class="character" src="assets/characters/gopher.png" alt="" />
        <div id="spark-left" class="spark"></div>
        <div id="spark-right" class="spark"></div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const duration = 10;
      const tl = gsap.timeline({ paused: true, defaults: { ease: "sine.inOut" } });
      tl.to("#xiaohei", { rotation: -3.2, y: -9, duration: 0.78, repeat: 11, yoyo: true }, 0.36);
      tl.to("#littlebox", { rotation: 2.2, y: -5, duration: 0.86, repeat: 9, yoyo: true }, 0.5);
      tl.to("#tom", { rotation: -4.4, y: -18, x: 4, duration: 0.7, repeat: 13, yoyo: true, ease: "power1.inOut" }, 0.08);
      tl.to("#ferris", { rotation: 3.4, y: -8, duration: 0.78, repeat: 11, yoyo: true, ease: "sine.inOut" }, 0.38);
      tl.to("#seal", { rotation: -2.4, y: -7, duration: 0.92, repeat: 9, yoyo: true, ease: "power1.inOut" }, 0.52);
      tl.to("#openclaw", { rotation: 4.8, y: -10, duration: 0.72, repeat: 11, yoyo: true, ease: "sine.inOut" }, 0.46);
      tl.to("#gopher", { rotation: 2.8, y: -9, x: -3, duration: 0.84, repeat: 9, yoyo: true, ease: "power1.inOut" }, 0.62);

      tl.to("#spark-left", { opacity: 0.65, scale: 1.8, duration: 0.42, repeat: 13, yoyo: true, ease: "power2.out" }, 0.64);
      tl.to("#spark-right", { opacity: 0.55, scale: 1.65, duration: 0.48, repeat: 13, yoyo: true, ease: "power2.out" }, 0.78);
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
