interface:
  display_name: "Visual IP Illustrations - Xiaohei / Littlebox / Tom / Ferris / Seal / OpenClaw / Go Gopher"
  short_description: "Visual IP Illustrations generates selectable visual-IP article-body illustration assets for Chinese articles. Omitted visual IP uses default Xiaohei; Littlebox is an explicit active route, Tom is an explicit gated-authorized protected-character route, Ferris is an explicit source-reviewed Rust-community mascot route, Seal is an explicit active product-neutral hoodie seal route, OpenClaw is an explicit source-reviewed logo-mascot route, and Go Gopher is an explicit source-reviewed article-mascot route."
  default_prompt: "Use $visual-ip-illustrations to design and generate article-body illustrations for this Chinese article. $ian-xiaohei-illustrations is the v1.4 compatibility alias. Omitted visual IP uses default Xiaohei; explicit choices include Littlebox, explicit Tom protected-character route (gated-authorized), explicit Ferris Rust-community mascot route (source-reviewed), explicit Seal active product-neutral hoodie seal route, explicit OpenClaw logo-mascot route (source-reviewed), and explicit Go Gopher article-mascot route (source-reviewed)."
policy:
  allow_implicit_invocation: true
