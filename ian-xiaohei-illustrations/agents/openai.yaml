  short_description: "Visual IP Illustrations generates selectable visual-IP article-body illustration assets for Chinese articles. Omitted visual IP uses default Xiaohei; Littlebox is an explicit active route, Tom is an explicit gated-authorized protected-character route, Ferris is an explicit source-reviewed Rust-community mascot route, and Sealos Seal is an explicit Sealos Seal brand-owned route with uploaded-image authority."
